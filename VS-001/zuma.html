<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>祖瑪 Zuma – 經典復刻</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a}
body{display:flex;justify-content:center;align-items:center;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#wrapper{position:relative;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center}
canvas{display:block;max-width:100vw;max-height:100vh;image-rendering:auto;background:#1a0a2e}
#ui{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:6px 12px;pointer-events:none;z-index:2;font-family:'Segoe UI','Microsoft YaHei',sans-serif;color:#fff;font-size:15px;text-shadow:0 0 6px #000}
#ui .left{text-align:left}#ui .center{text-align:center;flex:1}#ui .right{text-align:right}
#level-name{font-size:13px;color:#ffd700}
</style>
</head>
<body>
<div id="wrapper">
<canvas id="c" width="800" height="600"></canvas>
<div id="ui">
<div class="left">分數<br><span id="score">0</span></div>
<div class="center"><span id="level-name"></span></div>
<div class="right">Combo<br><span id="combo-display">-</span></div>
</div>
</div>
<script>
// ============================================================
//  CONSTANTS
// ============================================================
const CW=800,CH=600,LX=400,LY=300,MR=16,MD=32,MG=2;
const RECOIL_DIST=14; // BUGFIX: front-chain recoil pixel amount on match-3 explosion

const COLORS=[
  {name:'red',   hex:'#FF3B3B',hi:'#FF8888',lo:'#991111'},
  {name:'blue',  hex:'#4499FF',hi:'#88BBFF',lo:'#113399'},
  {name:'green', hex:'#44DD44',hi:'#88FF88',lo:'#118811'},
  {name:'yellow',hex:'#FFCC00',hi:'#FFEE88',lo:'#997700'},
  {name:'purple',hex:'#CC44FF',hi:'#DD88FF',lo:'#661199'}
];
const PWRS={NONE:null,PAUSE:'pause',REVERSE:'reverse',ACCURACY:'accuracy',BOMB:'bomb'};

// ============================================================
//  TRACK GENERATORS (10 levels)
// ============================================================
function genArc(cx,cy,r,a0,a1,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1),a=a0+(a1-a0)*t;p.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});}return p}
function genSpiral(cx,cy,loops,startR,endR,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1),a=t*loops*2*Math.PI,r=startR-(startR-endR)*t;p.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});}return p}
function genSineWave(x0,x1,cy,amp,freq,n){const p=[],w=x1-x0;for(let i=0;i<n;i++){const t=i/(n-1),x=x0+w*t,y=cy+amp*Math.sin(t*freq*2*Math.PI);p.push({x,y});}return p}
function genFigure8(cx,cy,w,h,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1),a=t*2*Math.PI;p.push({x:cx+w*Math.sin(a),y:cy+h*Math.sin(2*a)*0.55});}return p}
function genPolar(cx,cy,rFn,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1),a=t*2*Math.PI,r=rFn(t,a);p.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});}return p}
function genParam(fn,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1);p.push(fn(t));}return p}

function L1_Arc(){return genArc(400,300,200,Math.PI*0.25,Math.PI*1.75,200)}
function L2_Sine(){return genSineWave(50,750,300,160,3,260)}
function L3_Spiral(){return genSpiral(400,300,2.5,220,45,340)}
function L4_Fig8(){return genFigure8(400,300,260,200,300)}
function L5_DoubleLoop(){return genPolar(400,300,(t)=>(140+90*Math.sin(t*Math.PI*2)),300)}
function L6_Snake(){return genParam((t)=>({x:55+690*t,y:300+140*Math.sin(t*7*Math.PI)*(1-t*0.4)}),320)}
function L7_Clover(){return genPolar(400,300,(t,a)=>(160+70*Math.cos(3*a)),280)}
function L8_Cross(){return genPolar(400,300,(t,a)=>(170+60*Math.sin(4*a)),340)}
function L9_TightSpiral(){return genSpiral(400,300,4.8,230,30,400)}
function L10_Boss(){return genPolar(400,300,(t,a)=>(60+170*(0.5+0.5*Math.sin(t*5*Math.PI))*Math.abs(Math.cos(a*1.5))),420)}

function buildTrack(pts){const segs=[];let total=0;for(let i=0;i<pts.length-1;i++){const dx=pts[i+1].x-pts[i].x,dy=pts[i+1].y-pts[i].y,len=Math.sqrt(dx*dx+dy*dy);segs.push({x1:pts[i].x,y1:pts[i].y,x2:pts[i+1].x,y2:pts[i+1].y,len,cum:total});total+=len}return{pts,segs,totalLen:total}}
function getPosAtDist(trk,dist){let rem=Math.max(0,Math.min(dist,trk.totalLen));for(const s of trk.segs){if(rem<=s.len){const t=s.len>0?rem/s.len:0;return{x:s.x1+(s.x2-s.x1)*t,y:s.y1+(s.y2-s.y1)*t}}rem-=s.len}const last=trk.pts[trk.pts.length-1];return{x:last.x,y:last.y}}

// ============================================================
//  10 LEVEL CONFIGS
// ============================================================
const LEVELS=[
  {name:'第1關 · 初試啼聲',gen:L1_Arc,spd:20,colors:3,initM:20,pushInt:5.5,pushCnt:2,target:400,pwrCh:0.05},
  {name:'第2關 · 蜿蜒小徑',gen:L2_Sine,spd:24,colors:3,initM:22,pushInt:5.0,pushCnt:2,target:500,pwrCh:0.06},
  {name:'第3關 · 螺旋入門',gen:L3_Spiral,spd:28,colors:3,initM:24,pushInt:4.8,pushCnt:2,target:650,pwrCh:0.07},
  {name:'第4關 · 無限迴廊',gen:L4_Fig8,spd:30,colors:4,initM:24,pushInt:4.5,pushCnt:2,target:800,pwrCh:0.08},
  {name:'第5關 · 雙環迷陣',gen:L5_DoubleLoop,spd:33,colors:4,initM:26,pushInt:4.2,pushCnt:3,target:1000,pwrCh:0.09},
  {name:'第6關 · 靈蛇出洞',gen:L6_Snake,spd:36,colors:4,initM:26,pushInt:3.8,pushCnt:3,target:1300,pwrCh:0.10},
  {name:'第7關 · 幸運草田',gen:L7_Clover,spd:40,colors:4,initM:28,pushInt:3.5,pushCnt:3,target:1600,pwrCh:0.11},
  {name:'第8關 · 時空隧道',gen:L8_Cross,spd:44,colors:5,initM:28,pushInt:3.2,pushCnt:3,target:2000,pwrCh:0.12,tunnels:[{from:0.28,to:0.38},{from:0.62,to:0.72}]},
  {name:'第9關 · 死亡螺旋',gen:L9_TightSpiral,spd:50,colors:5,initM:30,pushInt:2.8,pushCnt:3,target:2600,pwrCh:0.13},
  {name:'第10關· 終極試煉',gen:L10_Boss,spd:55,colors:5,initM:32,pushInt:2.5,pushCnt:4,target:3200,pwrCh:0.15,tunnels:[{from:0.35,to:0.48},{from:0.70,to:0.85}]}
];

// ============================================================
//  GAME STATE
// ============================================================
let canvas,ctx,track,levelCfg;
let phase='title';
let score=0,levelScore=0,comboCount=0,maxCombo=0,currentLvl=0;
let marbles=[],pushTimer=0;
let launcherAngle=-Math.PI/2,curBall=0,nextBall=0;
// BUGFIX: Multi-projectile — use array instead of single ball
let flyingBalls=[];
let pauseTimer=0,reverseTimer=0,accuracyTimer=0;
let shakeX=0,shakeY=0,shakeD=0,shakeI=0;
let particles=[],floatingTexts=[];
let pointerX=LX,pointerY=LY-100,pointerDown=false,pointerOnCanvas=false,isTouch=false;
let comboFlash=0,spawning=true;
// BUGFIX: Recoil state for front-chain bounce-back on elimination
let recoilState=null; // {frontStartIdx,recoilRemain}
let activeSnap=null;
let skullGlow=0,levelClearTimer=0;

// ============================================================
//  AUDIO
// ============================================================
let audioCtx=null;
function initAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume()}
function beep(f,d,v=0.07,t='square'){if(!audioCtx)return;try{const tm=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,tm);g.gain.setValueAtTime(v,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+d);o.connect(g);g.connect(audioCtx.destination);o.start(tm);o.stop(tm+d)}catch(e){}}
function sfxShoot(){beep(800,0.06,0.05);beep(600,0.08,0.03)}
function sfxHit(){beep(200,0.12,0.06,'triangle')}
function sfxRecoil(){beep(100,0.1,0.08,'sawtooth');beep(60,0.15,0.06,'triangle')}
function sfxMatch(n){beep(440+n*80,0.15,0.06);setTimeout(()=>beep(660+n*100,0.12,0.05),60)}
function sfxCombo(n){const b=440+n*60;beep(b,0.1,0.06);setTimeout(()=>beep(b*1.25,0.1,0.05),50);setTimeout(()=>beep(b*1.5,0.12,0.06),100)}
function sfxBomb(){beep(60,0.35,0.14,'sawtooth');beep(40,0.5,0.1,'triangle')}
function sfxPower(){beep(1000,0.08,0.05);setTimeout(()=>beep(1200,0.08,0.04),60);setTimeout(()=>beep(1400,0.1,0.05),120)}
function sfxSnap(){beep(300,0.15,0.06,'triangle');setTimeout(()=>beep(500,0.1,0.05),80)}
function sfxWin(){beep(523,0.15,0.06);setTimeout(()=>beep(659,0.15,0.06),120);setTimeout(()=>beep(784,0.15,0.06),240);setTimeout(()=>beep(1047,0.35,0.09),360)}
function sfxLose(){beep(300,0.2,0.09,'sawtooth');setTimeout(()=>beep(200,0.3,0.1,'sawtooth'),150);setTimeout(()=>beep(100,0.4,0.12,'sawtooth'),350)}
function sfxLevelClear(){beep(660,0.12,0.06);setTimeout(()=>beep(880,0.12,0.06),100);setTimeout(()=>beep(1100,0.12,0.06),200);setTimeout(()=>beep(1320,0.2,0.08),300);setTimeout(()=>beep(1760,0.4,0.1),450)}

// ============================================================
//  PARTICLES
// ============================================================
function spawnParts(x,y,ci,count,spread=3){const c=COLORS[ci];for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=70+Math.random()*200;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.4+Math.random()*0.6,maxL:0.4+Math.random()*0.6,r:2+Math.random()*3*spread,color:c.hex,alpha:1})}}
function spawnSparks(x,y,count){const clrs=['#FF6600','#FFAA00','#FFDD00','#FF3300','#FFFFFF'];for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=150+Math.random()*300;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3+Math.random()*0.7,maxL:0.3+Math.random()*0.7,r:1+Math.random()*3,color:clrs[Math.floor(Math.random()*clrs.length)],alpha:1})}}
function spawnIce(x,y){for(let i=0;i<4;i++){particles.push({x,y,vx:(Math.random()-0.5)*30,vy:(Math.random()-0.5)*30,life:0.6+Math.random()*0.5,maxL:0.6+Math.random()*0.5,r:3+Math.random()*4,color:'#99DDFF',alpha:0.6})}}
function spawnSnapTrail(x,y,ci){const c=COLORS[ci];for(let i=0;i<2;i++){particles.push({x,y,vx:(Math.random()-0.5)*60,vy:(Math.random()-0.5)*60,life:0.2+Math.random()*0.3,maxL:0.2+Math.random()*0.3,r:2+Math.random()*3,color:c.hex,alpha:0.7})}}
function spawnRecoilParticles(x,y,ci){const c=COLORS[ci];for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,s=40+Math.random()*120;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.15+Math.random()*0.25,maxL:0.15+Math.random()*0.25,r:1.5+Math.random()*2.5,color:c.hex,alpha:1})}}
function spawnFloatText(x,y,txt,color='#FFD700',size=18){floatingTexts.push({x,y,text:txt,color,size,life:1.2,maxL:1.2})}

// ============================================================
//  HELPERS
// ============================================================
function isInTunnel(dist){if(!levelCfg||!levelCfg.tunnels)return false;const t=dist/track.totalLen;for(const tn of levelCfg.tunnels)if(t>=tn.from&&t<=tn.to)return true;return false}
function getMPos(m){return getPosAtDist(track,m.dist)}
function randCol(){return Math.floor(Math.random()*levelCfg.colors)}
function randPwr(){if(Math.random()>=levelCfg.pwrCh)return PWRS.NONE;return[PWRS.PAUSE,PWRS.REVERSE,PWRS.ACCURACY,PWRS.BOMB][Math.floor(Math.random()*4)]}
function hexToRgba(h,a){return`rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${a})`}

// ============================================================
//  LEVEL LOADING
// ============================================================
function loadLevel(idx){
  currentLvl=idx;levelCfg=LEVELS[idx];track=buildTrack(levelCfg.gen());
  marbles=[];pushTimer=0;
  // BUGFIX: Reset multi-projectile array on level load
  flyingBalls=[];
  comboCount=0;maxCombo=0;
  pauseTimer=0;reverseTimer=0;accuracyTimer=0;
  shakeX=0;shakeY=0;shakeD=0;shakeI=0;
  particles=[];floatingTexts=[];comboFlash=0;
  // BUGFIX: Reset recoil and snap physics
  recoilState=null;activeSnap=null;skullGlow=0;
  levelScore=0;spawning=true;levelClearTimer=0;
  curBall=randCol();nextBall=randCol();
  const sp=MD+MG,sd=MR+4;
  for(let i=0;i<levelCfg.initM;i++){const d=sd+i*sp;if(d>track.totalLen-MR)break;marbles.push({ci:randCol(),dist:d,pwr:randPwr()})}
  phase='playing';updateUI();
}
function updateUI(){
  document.getElementById('score').textContent=score;
  document.getElementById('level-name').textContent=levelCfg.name;
  document.getElementById('combo-display').textContent=comboCount>0?'x'+comboCount:'-';
}

// ============================================================
//  INPUT
// ============================================================
function getLogical(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(CW/r.width),y:(e.clientY-r.top)*(CH/r.height)}}
function onPDown(e){
  e.preventDefault();initAudio();isTouch=(e.pointerType==='touch');
  const p=getLogical(e);pointerX=p.x;pointerY=p.y;pointerDown=true;pointerOnCanvas=true;
  if(isTouch){
    const dx=p.x-LX,dy=p.y-LY;if(Math.sqrt(dx*dx+dy*dy)<45){swapBalls();pointerDown=false;return}
    launcherAngle=Math.atan2(p.y-LY,p.x-LX);if(phase==='playing')shoot();
  }else{launcherAngle=Math.atan2(p.y-LY,p.x-LX)}
}
function onPMove(e){e.preventDefault();if(!pointerOnCanvas)return;const p=getLogical(e);pointerX=p.x;pointerY=p.y;launcherAngle=Math.atan2(p.y-LY,p.x-LX)}
function onPUp(e){if(!pointerDown)return;pointerDown=false;
  // BUGFIX: PC rapid-fire — shoot on every click, no blocking
  if(!isTouch&&phase==='playing')shoot();
}
function onPEnter(){pointerOnCanvas=true}
function onPLeave(){pointerOnCanvas=false;pointerDown=false}
function onKey(e){
  initAudio();
  if(e.code==='Space'){e.preventDefault();if(phase==='playing')swapBalls()}
  if(e.code==='KeyR'&&(phase==='win'||phase==='lose'))restartGame();
  if(e.code==='Enter'&&(phase==='title'||phase==='levelClear')){if(phase==='title')startGame();else nextLevel();}
}
function swapBalls(){const t=curBall;curBall=nextBall;nextBall=t;beep(880,0.05,0.04)}

// ============================================================
//  BUGFIX: SHOOTING — Multi-projectile with instant replenish
// ============================================================
function shoot(){
  if(phase!=='playing')return;
  const spd=accuracyTimer>0?900:600;
  const vx=Math.cos(launcherAngle)*spd,vy=Math.sin(launcherAngle)*spd;
  // BUGFIX: Push to array — allows simultaneous flying balls
  flyingBalls.push({
    x:LX+Math.cos(launcherAngle)*(MR+10),y:LY+Math.sin(launcherAngle)*(MR+10),
    vx,vy,ci:curBall,trail:[]
  });
  // BUGFIX: Instant replenish — next ball becomes current, new random next
  curBall=nextBall;nextBall=randCol();
  sfxShoot();
}

// ============================================================
//  BUGFIX: COLLISION — Per-ball check with safe splice disposal
// ============================================================
function checkFlyingCollision(fb,fbIdx){
  // BUGFIX: Out-of-bounds disposal — splice ball if it leaves canvas
  if(fb.x<-60||fb.x>CW+60||fb.y<-60||fb.y>CH+60){
    flyingBalls.splice(fbIdx,1);return true;
  }
  // Wall bounce
  if(fb.x<MR||fb.x>CW-MR){fb.vx*=-1;fb.x=Math.max(MR,Math.min(CW-MR,fb.x))}
  if(fb.y<MR||fb.y>CH-MR){fb.vy*=-1;fb.y=Math.max(MR,Math.min(CH-MR,fb.y))}
  // Check collision with chain marbles
  let best=-1,bestD=Infinity;
  for(let i=0;i<marbles.length;i++){if(isInTunnel(marbles[i].dist))continue;const mp=getMPos(marbles[i]);const d=Math.hypot(fb.x-mp.x,fb.y-mp.y);if(d<MD&&d<bestD){bestD=d;best=i}}
  if(best>=0){
    let insD=marbles[best].dist,minD=Infinity;
    for(const s of track.segs){
      const dx=s.x2-s.x1,dy=s.y2-s.y1,lenSq=dx*dx+dy*dy;if(lenSq===0)continue;
      const t=Math.max(0,Math.min(1,((fb.x-s.x1)*dx+(fb.y-s.y1)*dy)/lenSq));
      const cx=s.x1+t*dx,cy=s.y1+t*dy,d=(fb.x-cx)**2+(fb.y-cy)**2;
      if(d<minD){minD=d;insD=s.cum+t*s.len}
    }
    insD=Math.max(MR,Math.min(track.totalLen-MR,insD));
    const nm={ci:fb.ci,dist:insD,pwr:PWRS.NONE};
    let idx=marbles.findIndex(mb=>mb.dist>insD);if(idx<0)idx=marbles.length;
    marbles.splice(idx,0,nm);
    for(let i=idx-1;i>=0;i--){const ed=marbles[i+1].dist-MD-MG;if(marbles[i].dist>ed)marbles[i].dist=ed;else break}
    for(let i=idx+1;i<marbles.length;i++){const ed=marbles[i-1].dist+MD+MG;if(marbles[i].dist<ed)marbles[i].dist=ed;else break}
    sfxHit();spawnParts(fb.x,fb.y,fb.ci,6,1.5);
    // BUGFIX: Safe removal from array by index
    flyingBalls.splice(fbIdx,1);return true;
  }
  return false;
}

// ============================================================
//  MATCH-3 DETECTION (with recoil trigger)
// ============================================================
function checkMatches(){
  let found=false;
  for(let i=0;i<marbles.length;i++){
    const c=marbles[i].ci;let j=i;while(j<marbles.length&&marbles[j].ci===c)j++;
    const cnt=j-i;
    if(cnt>=3){
      found=true;comboCount++;
      let sx=0,sy=0;for(let k=i;k<j;k++){const mp=getMPos(marbles[k]);sx+=mp.x;sy+=mp.y}
      const cx=sx/cnt,cy=sy/cnt;
      let ap=null;for(let k=i;k<j;k++){if(marbles[k].pwr){ap=marbles[k].pwr;break}}
      for(let k=i;k<j;k++){const mp=getMPos(marbles[k]);spawnParts(mp.x,mp.y,marbles[k].ci,14,2.5)}

      // BUGFIX: Store the front-start index BEFORE splice, for recoil
      const frontStartIdx=i; // after splice, front section will be at this index

      marbles.splice(i,cnt);

      // BUGFIX: Front-chain recoil — front section bounces backward from explosion
      if(marbles.length>frontStartIdx){
        recoilState={frontStartIdx,recoilRemain:RECOIL_DIST};
        sfxRecoil();
        // Spawn recoil particles at the gap
        const fp=getMPos(marbles[frontStartIdx]);
        spawnRecoilParticles(fp.x,fp.y,marbles[frontStartIdx].ci);
      }

      const base=cnt*10;const bonus=comboCount>1?comboCount*8:0;const earned=base+bonus;
      score+=earned;levelScore+=earned;if(comboCount>maxCombo)maxCombo=comboCount;
      let txt='+'+earned;if(comboCount>1)txt='Combo x'+comboCount+'! +'+earned;
      spawnFloatText(cx,cy,txt,comboCount>1?'#FF6600':'#FFD700',comboCount>1?22:16);
      if(comboCount>=2){comboFlash=0.3;sfxCombo(comboCount)}else{sfxMatch(cnt)}
      if(ap===PWRS.BOMB)activateBomb(cx,cy);
      else if(ap===PWRS.PAUSE){pauseTimer=5;sfxPower()}
      else if(ap===PWRS.REVERSE){reverseTimer=3;sfxPower()}
      else if(ap===PWRS.ACCURACY){accuracyTimer=6;sfxPower()}
      updateUI();break;
    }
  }
  return found;
}

function activateBomb(x,y){
  const rad=60;shakeD=0.45;shakeI=10;sfxBomb();
  for(let i=marbles.length-1;i>=0;i--){const mp=getMPos(marbles[i]);if(Math.hypot(mp.x-x,mp.y-y)<rad){spawnSparks(mp.x,mp.y,15);marbles.splice(i,1)}}
  for(let i=0;i<36;i++){const a=(i/36)*Math.PI*2;particles.push({x,y,vx:Math.cos(a)*280,vy:Math.sin(a)*280,life:0.35,maxL:0.35,r:5,color:i%2===0?'#FF4400':'#FFAA00',alpha:0.9})}
  score+=15;levelScore+=15;spawnFloatText(x,y,'💥','#FF4400',24);
}

// ============================================================
//  BUGFIX: RECOIL ANIMATION — Front chain bounce-back
// ============================================================
function updateRecoil(dt){
  if(!recoilState)return false;
  const dtc=Math.min(dt,0.1);
  const recoilSpd=280; // pixels per second
  const move=Math.min(recoilSpd*dtc,recoilState.recoilRemain);
  // Move front section backward (toward start) for explosive recoil
  for(let j=recoilState.frontStartIdx;j<marbles.length;j++)marbles[j].dist-=move;
  recoilState.recoilRemain-=move;
  if(recoilState.recoilRemain<=0.5){recoilState=null;return true} // recoil complete
  return false;
}

// ============================================================
//  SNAP-BACK SYSTEM (Animated magnetic attraction)
// ============================================================
function findSnapBack(){
  if(activeSnap||recoilState)return false; // BUGFIX: wait for recoil to finish
  for(let i=1;i<marbles.length;i++){
    const gap=marbles[i].dist-marbles[i-1].dist;
    if(gap>MD+MG+6){
      if(marbles[i-1].ci===marbles[i].ci){
        const remain=gap-(MD+MG);
        activeSnap={rearEnd:i-1,frontStart:i,gapRemain:remain,snapSpd:levelCfg.spd*3};
        sfxSnap();if(comboCount===0)comboCount=1;
        return true;
      }
    }
  }
  return false;
}
function updateSnapBack(dt){
  if(!activeSnap)return false;
  const dtc=Math.min(dt,0.1);
  const close=Math.min(activeSnap.snapSpd*dtc,activeSnap.gapRemain);
  for(let i=0;i<=activeSnap.rearEnd;i++)marbles[i].dist+=close;
  for(let i=0;i<=activeSnap.rearEnd;i+=2){const mp=getMPos(marbles[i]);spawnSnapTrail(mp.x,mp.y,marbles[i].ci)}
  activeSnap.gapRemain-=close;
  if(activeSnap.gapRemain<=0.5){
    const tg=marbles[activeSnap.frontStart].dist-MD-MG,off=tg-marbles[activeSnap.rearEnd].dist;
    for(let i=0;i<=activeSnap.rearEnd;i++)marbles[i].dist+=off;
    activeSnap=null;return true;
  }
  return false;
}

// ============================================================
//  MATCH RESOLUTION (Cascading)
// ============================================================
function processMatches(){
  // BUGFIX: Don't process during recoil or snap animations; also check flyingBalls array
  if(flyingBalls.length>0||recoilState||activeSnap)return;
  let anyM=false;
  for(let iter=0;iter<15;iter++){
    const hadM=checkMatches();
    // checkMatches may have started a recoil; if so, stop and wait
    if(recoilState)break;
    const hadS=findSnapBack();
    if(!hadM&&!hadS)break;
    if(hadM)anyM=true;
    // findSnapBack may have started a snap; if so, stop and wait
    if(activeSnap)break;
  }
  if(!anyM&&comboCount>0){if(comboCount>maxCombo)maxCombo=comboCount;comboCount=0;updateUI()}
}

// ============================================================
//  UPDATE
// ============================================================
let trailTimer=0;
function update(dt){
  if(phase!=='playing')return;
  const dtc=Math.min(dt,0.1);
  if(comboFlash>0)comboFlash-=dtc;
  if(pauseTimer>0)pauseTimer-=dtc;if(reverseTimer>0)reverseTimer-=dtc;if(accuracyTimer>0)accuracyTimer-=dtc;
  if(shakeD>0){shakeD-=dtc;shakeX=(Math.random()-0.5)*shakeI*2;shakeY=(Math.random()-0.5)*shakeI*2;shakeI*=0.88;if(shakeD<=0){shakeX=0;shakeY=0}}
  if(pauseTimer>0&&Math.random()<0.3){const mx=Math.random()*CW,my=Math.random()*CH;spawnIce(mx,my)}

  let mv=levelCfg.spd;if(pauseTimer>0)mv=0;if(reverseTimer>0)mv=-levelCfg.spd*1.5;

  // BUGFIX: Animate recoil FIRST (sequential with snap)
  let recoilDone=false;
  if(recoilState){recoilDone=updateRecoil(dtc)}

  // Normal chain movement (skip rear section during active snap)
  if(mv!==0){
    for(let i=0;i<marbles.length;i++){
      if(activeSnap&&i<=activeSnap.rearEnd)continue;
      marbles[i].dist+=mv*dtc;
    }
  }

  // Animated snap-back (only if recoil is done)
  if(activeSnap&&!recoilState){const closed=updateSnapBack(dtc);if(closed)processMatches()}

  for(const m of marbles){if(m.dist<MR)m.dist=MR}
  for(const m of marbles){if(m.dist>=track.totalLen-MR){phase='lose';sfxLose();return}}

  // Spawn new marbles
  if(spawning){
    pushTimer+=dtc;
    if(pushTimer>=levelCfg.pushInt){
      pushTimer=0;const sd=MR+4;
      for(let i=0;i<levelCfg.pushCnt;i++){
        let lastD=sd;
        for(let j=marbles.length-1;j>=0;j--)if(marbles[j].dist<sd+60)lastD=Math.max(lastD,marbles[j].dist+MD+MG);else break;
        if(lastD<track.totalLen-MR){marbles.push({ci:randCol(),dist:lastD,pwr:randPwr()});marbles.sort((a,b)=>a.dist-b.dist)}
      }
    }
  }
  if(spawning&&levelScore>=levelCfg.target){spawning=false}

  // BUGFIX: Iterate flyingBalls array — reverse for safe splice removal
  for(let i=flyingBalls.length-1;i>=0;i--){
    const fb=flyingBalls[i];
    fb.x+=fb.vx*dtc;fb.y+=fb.vy*dtc;
    if(accuracyTimer>0){trailTimer+=dtc;if(trailTimer>0.03){trailTimer=0;fb.trail=fb.trail||[];fb.trail.push({x:fb.x,y:fb.y,life:0.2,maxL:0.2});if(fb.trail.length>15)fb.trail.shift()}}
    checkFlyingCollision(fb,i);
  }
  // BUGFIX: Update trails for ALL flying balls
  for(const fb of flyingBalls){if(fb.trail){for(const t of fb.trail)t.life-=dtc;fb.trail=fb.trail.filter(t=>t.life>0)}}

  // Particles
  for(const p of particles){p.x+=p.vx*dtc;p.y+=p.vy*dtc;p.life-=dtc;p.alpha=Math.max(0,p.life/p.maxL)}
  particles=particles.filter(p=>p.life>0);
  for(const ft of floatingTexts){ft.y-=30*dtc;ft.life-=dtc}
  floatingTexts=floatingTexts.filter(ft=>ft.life>0);

  // Skull glow
  let nearEnd=false;for(const m of marbles){if(m.dist>track.totalLen-80){nearEnd=true;break}}
  skullGlow+=(nearEnd?1:-1)*dtc*3;skullGlow=Math.max(0,Math.min(1,skullGlow));

  // BUGFIX: Level clear checks flyingBalls.length (not single flying)
  if(marbles.length===0&&flyingBalls.length===0&&levelScore>=levelCfg.target){
    if(levelClearTimer===0)sfxLevelClear();
    levelClearTimer+=dtc;
    if(levelClearTimer>0.6){phase='levelClear';levelClearTimer=0}
  }

  // Cascading match resolution
  processMatches();
}

      const t1=Math.max(0,(tn.from*track.totalLen-s.cum)/s.len),t2=Math.min(1,(tn.to*track.totalLen-s.cum)/s.len);

    }ctx.setLineDash([7,9]);ctx.stroke();ctx.setLineDash([]);
  }}

}
function drawWin(){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,CW,CH);ctx.fillStyle='#FFD700';ctx.font='bold 44px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('🎉 全部通關！',CW/2,200);ctx.fillStyle='#fff';ctx.font='19px "Microsoft YaHei",sans-serif';ctx.fillText('總分: '+score+'  最大連擊: x'+maxCombo,CW/2,260);ctx.fillStyle='#FFAA00';ctx.font='17px "Microsoft YaHei",sans-serif';ctx.fillText('點擊 或 按 R 重新開始',CW/2,320)}
function drawLose(){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,CW,CH);ctx.fillStyle='#FF4444';ctx.font='bold 44px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('💀 失敗！',CW/2,200);ctx.fillStyle='#fff';ctx.font='19px "Microsoft YaHei",sans-serif';ctx.fillText('分數: '+score+'  最大連擊: x'+maxCombo,CW/2,260);ctx.fillStyle='#FFAA00';ctx.font='17px "Microsoft YaHei",sans-serif';ctx.fillText('點擊 或 按 R 重新挑戰',CW/2,320)}
function drawLevelClear(){const t=levelClearTimer||0;ctx.fillStyle=`rgba(0,0,0,${Math.min(0.7,t*2)})`;ctx.fillRect(0,0,CW,CH);const scale=Math.min(1,t*3);ctx.save();ctx.translate(CW/2,240);ctx.scale(scale,scale);ctx.fillStyle='#FFD700';ctx.font='bold 40px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('🎉 關卡完成！',0,0);ctx.restore();ctx.fillStyle='#fff';ctx.font='18px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('分數: '+score+'  本關目標: '+levelCfg.target,CW/2,285);if(currentLvl<LEVELS.length-1){ctx.fillStyle='#FFAA00';ctx.font='16px "Microsoft YaHei",sans-serif';ctx.fillText('點擊 或 按 Enter 進入下一關',CW/2,320)}else{ctx.fillStyle='#FFAA00';ctx.font='16px "Microsoft YaHei",sans-serif';ctx.fillText('點擊 或 按 Enter 查看總結',CW/2,320)}}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}

// ============================================================
//  GAME FLOW
// ============================================================
function startGame(){score=0;levelScore=0;comboCount=0;maxCombo=0;currentLvl=0;loadLevel(0)}
function restartGame(){levelScore=0;comboCount=0;loadLevel(currentLvl)}
function nextLevel(){if(currentLvl<LEVELS.length-1){currentLvl++;levelScore=0;loadLevel(currentLvl)}else{phase='win';sfxWin()}}
function handleScreenClick(){if(phase==='title')startGame();else if(phase==='win')restartGame();else if(phase==='lose')restartGame();else if(phase==='levelClear')nextLevel()}

// ============================================================
//  MAIN LOOP
// ============================================================
let lastT=0;
function loop(ts){const dt=lastT?(ts-lastT)/1000:0.016;lastT=ts;update(dt);render();requestAnimationFrame(loop)}

// ============================================================
//  INIT
// ============================================================
function init(){
  canvas=document.getElementById('c');ctx=canvas.getContext('2d');
  canvas.addEventListener('pointerdown',onPDown);canvas.addEventListener('pointermove',onPMove);
  canvas.addEventListener('pointerup',onPUp);canvas.addEventListener('pointerenter',onPEnter);
  canvas.addEventListener('pointerleave',onPLeave);document.addEventListener('keydown',onKey);
  canvas.addEventListener('click',(e)=>{if(phase!=='playing')handleScreenClick()});
  isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
  loadLevel(0);phase='title';updateUI();requestAnimationFrame(loop);
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
