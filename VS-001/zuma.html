<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>祖瑪 Zuma – 經典復刻</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a}
body{display:flex;justify-content:center;align-items:center;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#wrapper{position:relative;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center}
canvas{display:block;max-width:100vw;max-height:100vh;image-rendering:auto;background:#1a0a2e}
#ui{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:6px 12px;pointer-events:none;z-index:2;font-family:'Segoe UI','Microsoft YaHei',sans-serif;color:#fff;font-size:15px;text-shadow:0 0 6px #000}
#ui .left{text-align:left}#ui .center{text-align:center;flex:1}#ui .right{text-align:right}
#level-name{font-size:13px;color:#ffd700}
</style>
</head>
<body>
<div id="wrapper">
<canvas id="c" width="800" height="600"></canvas>
<div id="ui">
<div class="left">分數<br><span id="score">0</span></div>
<div class="center"><span id="level-name"></span></div>
<div class="right">Combo<br><span id="combo-display">-</span></div>
</div>
</div>
<script>
// ============================================================
//  CONSTANTS
// ============================================================
const CW=800,CH=600,LX=400,LY=300,MR=16,MD=32,MG=2;
// FIXED_BUG_2: Increased recoil from 14→20px for more visible bounce-back
const RECOIL_DIST=20,RECOIL_SPD=220;

const COLORS=[
  {name:'red',   hex:'#FF3B3B',hi:'#FF8888',lo:'#991111'},
  {name:'blue',  hex:'#4499FF',hi:'#88BBFF',lo:'#113399'},
  {name:'green', hex:'#44DD44',hi:'#88FF88',lo:'#118811'},
  {name:'yellow',hex:'#FFCC00',hi:'#FFEE88',lo:'#997700'},
  {name:'purple',hex:'#CC44FF',hi:'#DD88FF',lo:'#661199'}
];
const PWRS={NONE:null,PAUSE:'pause',REVERSE:'reverse',ACCURACY:'accuracy',BOMB:'bomb'};

// ============================================================
//  TRACK GENERATORS (10 levels)
// ============================================================
function genArc(cx,cy,r,a0,a1,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1),a=a0+(a1-a0)*t;p.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});}return p}
function genSpiral(cx,cy,loops,startR,endR,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1),a=t*loops*2*Math.PI,r=startR-(startR-endR)*t;p.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});}return p}
function genSineWave(x0,x1,cy,amp,freq,n){const p=[],w=x1-x0;for(let i=0;i<n;i++){const t=i/(n-1),x=x0+w*t,y=cy+amp*Math.sin(t*freq*2*Math.PI);p.push({x,y});}return p}
function genFigure8(cx,cy,w,h,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1),a=t*2*Math.PI;p.push({x:cx+w*Math.sin(a),y:cy+h*Math.sin(2*a)*0.55});}return p}
function genPolar(cx,cy,rFn,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1),a=t*2*Math.PI,r=rFn(t,a);p.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});}return p}
function genParam(fn,n){const p=[];for(let i=0;i<n;i++){const t=i/(n-1);p.push(fn(t));}return p}

function L1_Arc(){return genArc(400,300,200,Math.PI*0.25,Math.PI*1.75,200)}
function L2_Sine(){return genSineWave(50,750,300,160,3,260)}
function L3_Spiral(){return genSpiral(400,300,2.5,220,45,340)}
function L4_Fig8(){return genFigure8(400,300,260,200,300)}
function L5_DoubleLoop(){return genPolar(400,300,(t)=>(140+90*Math.sin(t*Math.PI*2)),300)}
function L6_Snake(){return genParam((t)=>({x:55+690*t,y:300+140*Math.sin(t*7*Math.PI)*(1-t*0.4)}),320)}
function L7_Clover(){return genPolar(400,300,(t,a)=>(160+70*Math.cos(3*a)),280)}
function L8_Cross(){return genPolar(400,300,(t,a)=>(170+60*Math.sin(4*a)),340)}
function L9_TightSpiral(){return genSpiral(400,300,4.8,230,30,400)}
function L10_Boss(){return genPolar(400,300,(t,a)=>(60+170*(0.5+0.5*Math.sin(t*5*Math.PI))*Math.abs(Math.cos(a*1.5))),420)}

function buildTrack(pts){const segs=[];let total=0;for(let i=0;i<pts.length-1;i++){const dx=pts[i+1].x-pts[i].x,dy=pts[i+1].y-pts[i].y,len=Math.sqrt(dx*dx+dy*dy);segs.push({x1:pts[i].x,y1:pts[i].y,x2:pts[i+1].x,y2:pts[i+1].y,len,cum:total});total+=len}return{pts,segs,totalLen:total}}
function getPosAtDist(trk,dist){let rem=Math.max(0,Math.min(dist,trk.totalLen));for(const s of trk.segs){if(rem<=s.len){const t=s.len>0?rem/s.len:0;return{x:s.x1+(s.x2-s.x1)*t,y:s.y1+(s.y2-s.y1)*t}}rem-=s.len}const last=trk.pts[trk.pts.length-1];return{x:last.x,y:last.y}}

// ============================================================
//  10 LEVEL CONFIGS
// ============================================================
const LEVELS=[
  {name:'第1關 · 初試啼聲',gen:L1_Arc,spd:20,colors:3,initM:20,pushInt:5.5,pushCnt:2,target:400,pwrCh:0.05},
  {name:'第2關 · 蜿蜒小徑',gen:L2_Sine,spd:24,colors:3,initM:22,pushInt:5.0,pushCnt:2,target:500,pwrCh:0.06},
  {name:'第3關 · 螺旋入門',gen:L3_Spiral,spd:28,colors:3,initM:24,pushInt:4.8,pushCnt:2,target:650,pwrCh:0.07},
  {name:'第4關 · 無限迴廊',gen:L4_Fig8,spd:30,colors:4,initM:24,pushInt:4.5,pushCnt:2,target:800,pwrCh:0.08},
  {name:'第5關 · 雙環迷陣',gen:L5_DoubleLoop,spd:33,colors:4,initM:26,pushInt:4.2,pushCnt:3,target:1000,pwrCh:0.09},
  {name:'第6關 · 靈蛇出洞',gen:L6_Snake,spd:36,colors:4,initM:26,pushInt:3.8,pushCnt:3,target:1300,pwrCh:0.10},
  {name:'第7關 · 幸運草田',gen:L7_Clover,spd:40,colors:4,initM:28,pushInt:3.5,pushCnt:3,target:1600,pwrCh:0.11},
  {name:'第8關 · 時空隧道',gen:L8_Cross,spd:44,colors:5,initM:28,pushInt:3.2,pushCnt:3,target:2000,pwrCh:0.12,tunnels:[{from:0.28,to:0.38},{from:0.62,to:0.72}]},
  {name:'第9關 · 死亡螺旋',gen:L9_TightSpiral,spd:50,colors:5,initM:30,pushInt:2.8,pushCnt:3,target:2600,pwrCh:0.13},
  {name:'第10關· 終極試煉',gen:L10_Boss,spd:55,colors:5,initM:32,pushInt:2.5,pushCnt:4,target:3200,pwrCh:0.15,tunnels:[{from:0.35,to:0.48},{from:0.70,to:0.85}]}
];

// ============================================================
//  GAME STATE
// ============================================================
let canvas,ctx,track,levelCfg;
let phase='title';
let score=0,levelScore=0,comboCount=0,maxCombo=0,currentLvl=0;
let marbles=[],pushTimer=0;
let launcherAngle=-Math.PI/2,curBall=0,nextBall=0;
let flyingBalls=[];
let pauseTimer=0,reverseTimer=0,accuracyTimer=0;
let shakeX=0,shakeY=0,shakeD=0,shakeI=0;
let particles=[],floatingTexts=[];
let pointerX=LX,pointerY=LY-100,pointerDown=false,pointerOnCanvas=false,isTouch=false;
let comboFlash=0,spawning=true;
// FIXED_BUG_2: Recoil state for front-chain bounce-back
let recoilState=null;
let activeSnap=null;
let skullGlow=0,levelClearTimer=0;
// FIXED_BUG_3: Track whether spawning has been marked as complete
let spawningComplete=false;
// UPGRADE_1: Swap animation state for launcher balls
let swapAnim=null; // {progress:0-1, duration:0.15}
// UPGRADE_2: Suction animation state for dying marble
let suctionState=null; // {marble, startX, startY, startDist, progress:0-1, duration:0.4}

// ============================================================
//  UPGRADE_4: Web Audio Synthesized Sound Effects (No External Files)
// ============================================================
let audioCtx=null;
function initAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume()}

// UPGRADE_4: Shoot sound — triangle wave, 400Hz→100Hz in 0.1s (Pew!)
function playShootSound(){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type='triangle';
  osc.frequency.setValueAtTime(400,t);
  osc.frequency.exponentialRampToValueAtTime(100,t+0.1);
  gain.gain.setValueAtTime(0.08,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start(t);osc.stop(t+0.1);
}

// UPGRADE_4: Insert sound — sine wave, 150Hz, 0.05s fadeout (Thud!)
function playInsertSound(){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(150,t);
  gain.gain.setValueAtTime(0.1,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start(t);osc.stop(t+0.05);
}

// UPGRADE_4: Combo eliminate sound — square wave + noise, pitch scales with combo
function playComboEliminateSound(comboCount){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  const baseFreq=440;
  const freq=baseFreq*Math.pow(1.15,comboCount-1); // Each combo ×1.15
  
  // Square wave
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type='square';
  osc.frequency.setValueAtTime(freq,t);
  gain.gain.setValueAtTime(0.07,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start(t);osc.stop(t+0.15);
  
  // White noise burst
  const bufferSize=audioCtx.sampleRate*0.1;
  const buffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
  const data=buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++)data[i]=(Math.random()*2-1)*0.3;
  const noise=audioCtx.createBufferSource();
  const noiseGain=audioCtx.createGain();
  noise.buffer=buffer;
  noiseGain.gain.setValueAtTime(0.05,t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  noise.connect(noiseGain);noiseGain.connect(audioCtx.destination);
  noise.start(t);noise.stop(t+0.1);
}

// UPGRADE_4: Game over sound — descending chord
function playGameOverSound(){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  const freqs=[300,200,100];
  freqs.forEach((f,i)=>{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(f,t+i*0.15);
    gain.gain.setValueAtTime(0.1,t+i*0.15);
    gain.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.4);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start(t+i*0.15);osc.stop(t+i*0.15+0.4);
  });
}

// UPGRADE_4: Level clear sound — ascending chord
function playLevelClearSound(){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  const freqs=[523,659,784,1047]; // C5, E5, G5, C6
  freqs.forEach((f,i)=>{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(f,t+i*0.1);
    gain.gain.setValueAtTime(0.08,t+i*0.1);
    gain.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.3);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start(t+i*0.1);osc.stop(t+i*0.1+0.3);
  });
}

// Legacy compatibility wrappers
function sfxShoot(){playShootSound()}
function sfxHit(){playInsertSound()}
function sfxRecoil(){if(!audioCtx)return;const t=audioCtx.currentTime;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(100,t);g.gain.setValueAtTime(0.09,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.12)}
function sfxMatch(n){if(!audioCtx)return;const t=audioCtx.currentTime;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(440+n*80,t);g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.15)}
function sfxCombo(n){playComboEliminateSound(n)}
function sfxBomb(){if(!audioCtx)return;const t=audioCtx.currentTime;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(60,t);g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.35)}
function sfxPower(){if(!audioCtx)return;const t=audioCtx.currentTime;[1000,1200,1400].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(f,t+i*0.06);g.gain.setValueAtTime(0.05,t+i*0.06);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.08);o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.06);o.stop(t+i*0.06+0.08)})}
function sfxSnap(){if(!audioCtx)return;const t=audioCtx.currentTime;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.setValueAtTime(300,t);g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.15)}
function sfxWin(){playLevelClearSound()}
function sfxLose(){playGameOverSound()}
function sfxLevelClear(){playLevelClearSound()}

// ============================================================
//  PARTICLES
// ============================================================
function spawnParts(x,y,ci,count,spread=3){const c=COLORS[ci];for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=70+Math.random()*200;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.4+Math.random()*0.6,maxL:0.4+Math.random()*0.6,r:2+Math.random()*3*spread,color:c.hex,alpha:1})}}
function spawnSparks(x,y,count){const clrs=['#FF6600','#FFAA00','#FFDD00','#FF3300','#FFFFFF'];for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=150+Math.random()*300;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3+Math.random()*0.7,maxL:0.3+Math.random()*0.7,r:1+Math.random()*3,color:clrs[Math.floor(Math.random()*clrs.length)],alpha:1})}}
function spawnIce(x,y){for(let i=0;i<4;i++){particles.push({x,y,vx:(Math.random()-0.5)*30,vy:(Math.random()-0.5)*30,life:0.6+Math.random()*0.5,maxL:0.6+Math.random()*0.5,r:3+Math.random()*4,color:'#99DDFF',alpha:0.6})}}
function spawnSnapTrail(x,y,ci){const c=COLORS[ci];for(let i=0;i<2;i++){particles.push({x,y,vx:(Math.random()-0.5)*60,vy:(Math.random()-0.5)*60,life:0.2+Math.random()*0.3,maxL:0.2+Math.random()*0.3,r:2+Math.random()*3,color:c.hex,alpha:0.7})}}
function spawnRecoilParticles(x,y,ci){const c=COLORS[ci];for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,s=50+Math.random()*140;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.18+Math.random()*0.3,maxL:0.18+Math.random()*0.3,r:2+Math.random()*3,color:c.hex,alpha:1})}}
function spawnFloatText(x,y,txt,color='#FFD700',size=18){floatingTexts.push({x,y,text:txt,color,size,life:1.2,maxL:1.2})}

// ============================================================
//  HELPERS
// ============================================================
function isInTunnel(dist){if(!levelCfg||!levelCfg.tunnels)return false;const t=dist/track.totalLen;for(const tn of levelCfg.tunnels)if(t>=tn.from&&t<=tn.to)return true;return false}
function getMPos(m){return getPosAtDist(track,m.dist)}
function randCol(){return Math.floor(Math.random()*levelCfg.colors)}
function randPwr(){if(Math.random()>=levelCfg.pwrCh)return PWRS.NONE;return[PWRS.PAUSE,PWRS.REVERSE,PWRS.ACCURACY,PWRS.BOMB][Math.floor(Math.random()*4)]}
function hexToRgba(h,a){return`rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${a})`}

// ============================================================
//  LEVEL LOADING
// ============================================================
function loadLevel(idx){
  currentLvl=idx;levelCfg=LEVELS[idx];track=buildTrack(levelCfg.gen());
  marbles=[];pushTimer=0;flyingBalls=[];
  comboCount=0;maxCombo=0;
  pauseTimer=0;reverseTimer=0;accuracyTimer=0;
  shakeX=0;shakeY=0;shakeD=0;shakeI=0;
  particles=[];floatingTexts=[];comboFlash=0;
  recoilState=null;activeSnap=null;skullGlow=0;suctionState=null;
  levelScore=0;spawning=true;levelClearTimer=0;spawningComplete=false;
  curBall=randCol();nextBall=randCol();
  const sp=MD+MG,sd=MR+4;
  for(let i=0;i<levelCfg.initM;i++){const d=sd+i*sp;if(d>track.totalLen-MR)break;marbles.push({ci:randCol(),dist:d,pwr:randPwr()})}
  phase='playing';updateUI();
}
function updateUI(){
  document.getElementById('score').textContent=score;
  document.getElementById('level-name').textContent=levelCfg.name;
  document.getElementById('combo-display').textContent=comboCount>0?'x'+comboCount:'-';
}

// ============================================================
//  INPUT
// ============================================================
function getLogical(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(CW/r.width),y:(e.clientY-r.top)*(CH/r.height)}}
function onPDown(e){
  e.preventDefault();initAudio();isTouch=(e.pointerType==='touch');
  const p=getLogical(e);pointerX=p.x;pointerY=p.y;pointerDown=true;pointerOnCanvas=true;
  if(isTouch){
    const dx=p.x-LX,dy=p.y-LY;if(Math.sqrt(dx*dx+dy*dy)<45){swapBalls();pointerDown=false;return}
    launcherAngle=Math.atan2(p.y-LY,p.x-LX);if(phase==='playing')shoot();
  }else{launcherAngle=Math.atan2(p.y-LY,p.x-LX)}
}
function onPMove(e){e.preventDefault();if(!pointerOnCanvas)return;const p=getLogical(e);pointerX=p.x;pointerY=p.y;launcherAngle=Math.atan2(p.y-LY,p.x-LX)}
function onPUp(e){if(!pointerDown)return;pointerDown=false;if(!isTouch&&phase==='playing')shoot();}
function onPEnter(){pointerOnCanvas=true}
function onPLeave(){pointerOnCanvas=false;pointerDown=false}
function onKey(e){
  initAudio();
  if(e.code==='Space'){e.preventDefault();if(phase==='playing')swapBalls()}
  if(e.code==='KeyR'&&(phase==='win'||phase==='lose'))restartGame();
  if(e.code==='Enter'&&(phase==='title'||phase==='levelClear')){if(phase==='title')startGame();else nextLevel();}
}
function swapBalls(){
  // UPGRADE_1: Start swap animation (0.15s duration)
  if(!swapAnim){
    swapAnim={progress:0,duration:0.15,fromCur:curBall,fromNext:nextBall};
    const t=curBall;curBall=nextBall;nextBall=t;
    if(audioCtx){const tm=audioCtx.currentTime;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(880,tm);g.gain.setValueAtTime(0.04,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.05);o.connect(g);g.connect(audioCtx.destination);o.start(tm);o.stop(tm+0.05)}
  }
}

// ============================================================
//  SHOOTING — Multi-projectile
// ============================================================
function shoot(){
  if(phase!=='playing')return;
  const spd=accuracyTimer>0?900:600;
  const vx=Math.cos(launcherAngle)*spd,vy=Math.sin(launcherAngle)*spd;
  flyingBalls.push({x:LX+Math.cos(launcherAngle)*(MR+10),y:LY+Math.sin(launcherAngle)*(MR+10),vx,vy,ci:curBall,trail:[],bounceCount:0});
  curBall=nextBall;nextBall=randCol();sfxShoot();
}

// ============================================================
//  COLLISION & INSERTION — returns insertIndex for match scan
// ============================================================
// FIXED_BOUNDARY_BOUNCE: 4-way full boundary bounce + bounce-count auto-destroy
function checkFlyingCollision(fb,fbIdx){
  // r = MR = 16, canvas = 800x600
  // FIXED_BOUNDARY_BOUNCE: Left wall  — ball.x - r <= 0  → reverse vx, clamp
  if(fb.x-MR<=0){fb.vx=-fb.vx;fb.x=MR;fb.bounceCount++;}
  // FIXED_BOUNDARY_BOUNCE: Right wall — ball.x + r >= 800 → reverse vx, clamp
  else if(fb.x+MR>=CW){fb.vx=-fb.vx;fb.x=CW-MR;fb.bounceCount++;}
  // FIXED_BOUNDARY_BOUNCE: Top wall   — ball.y - r <= 0  → reverse vy, clamp
  if(fb.y-MR<=0){fb.vy=-fb.vy;fb.y=MR;fb.bounceCount++;}
  // FIXED_BOUNDARY_BOUNCE: Bottom wall — ball.y + r >= 600 → reverse vy, clamp
  else if(fb.y+MR>=CH){fb.vy=-fb.vy;fb.y=CH-MR;fb.bounceCount++;}
  // FIXED_BOUNDARY_BOUNCE: Auto-destroy after 5+ wall bounces (missed shot memory safety)
  if(fb.bounceCount>5){flyingBalls.splice(fbIdx,1);return -1;}
  // FIXED_BOUNDARY_BOUNCE: Extreme OOB safety net
  if(fb.x<-100||fb.x>CW+100||fb.y<-100||fb.y>CH+100){flyingBalls.splice(fbIdx,1);return -1;}
  let best=-1,bestD=Infinity;
  for(let i=0;i<marbles.length;i++){if(isInTunnel(marbles[i].dist))continue;const mp=getMPos(marbles[i]);const d=Math.hypot(fb.x-mp.x,fb.y-mp.y);if(d<MD&&d<bestD){bestD=d;best=i}}
  if(best>=0){
    // FIXED_BUG_1: Use the collision marble's position, not a track-wide search
    // Determine insert side based on flying ball's approach direction
    const m=marbles[best];
    let insD=m.dist;
    const approachAngle=Math.atan2(fb.vy,fb.vx);
    const trackAngle=Math.atan2(fb.y-getMPos(m).y,fb.x-getMPos(m).x);
    // If ball approaches from start-direction, insert before; else insert after
    const dot=Math.cos(approachAngle)*Math.cos(trackAngle)+Math.sin(approachAngle)*Math.sin(trackAngle);
    if(dot>0){insD=Math.max(MR,m.dist-MD*0.6)}else{insD=Math.min(track.totalLen-MR,m.dist+MD*0.6)}
    const nm={ci:fb.ci,dist:insD,pwr:PWRS.NONE};
    let idx=marbles.findIndex(mb=>mb.dist>insD);if(idx<0)idx=marbles.length;
    marbles.splice(idx,0,nm);
    for(let i=idx-1;i>=0;i--){const ed=marbles[i+1].dist-MD-MG;if(marbles[i].dist>ed)marbles[i].dist=ed;else break}
    for(let i=idx+1;i<marbles.length;i++){const ed=marbles[i-1].dist+MD+MG;if(marbles[i].dist<ed)marbles[i].dist=ed;else break}
    sfxHit();spawnParts(fb.x,fb.y,fb.ci,6,1.5);flyingBalls.splice(fbIdx,1);
    // FIXED_BUG_1: return insertion index for immediate bidirectional match scan
    return idx;
  }
  return -1;
}

// ============================================================
//  FIXED_BUG_1: Bidirectional Match-3 Scan from insertion point
//  Scans LEFT and RIGHT from centerIdx, counts consecutive same-color
//  marbles. Removes them if count>=3. Triggers recoil on front section.
//  Handles edge cases: first marble, last marble, single marble.
// ============================================================
function scanAndRemove(centerIdx){
  if(centerIdx<0||centerIdx>=marbles.length)return false;
  const c=marbles[centerIdx].ci;
  // Scan LEFT from center
  let left=centerIdx;
  while(left>0&&marbles[left-1].ci===c)left--;
  // Scan RIGHT from center
  let right=centerIdx;
  while(right<marbles.length-1&&marbles[right+1].ci===c)right++;
  const cnt=right-left+1;
  if(cnt<3)return false;

  // Found match-3+ — increment combo
  comboCount++;
  if(comboCount>maxCombo)maxCombo=comboCount;

  // Calculate center for effects
  let sx=0,sy=0;
  for(let k=left;k<=right;k++){const mp=getMPos(marbles[k]);sx+=mp.x;sy+=mp.y}
  const cx=sx/cnt,cy=sy/cnt;

  // Check for power-ups
  let ap=null;
  for(let k=left;k<=right;k++){if(marbles[k].pwr){ap=marbles[k].pwr;break}}

  // Spawn particles per marble
  for(let k=left;k<=right;k++){const mp=getMPos(marbles[k]);spawnParts(mp.x,mp.y,marbles[k].ci,14,2.5)}

  // FIXED_BUG_2: Store frontStart BEFORE splice for recoil
  const frontStartIdx=left;

  // Remove matched marbles
  marbles.splice(left,cnt);

  // FIXED_BUG_2: Front-chain recoil — bounces backward from explosion force
  if(marbles.length>frontStartIdx){
    recoilState={frontStartIdx,recoilRemain:RECOIL_DIST};
    sfxRecoil();
    if(marbles.length>frontStartIdx){
      const fp=getMPos(marbles[frontStartIdx]);
      spawnRecoilParticles(fp.x,fp.y,marbles[frontStartIdx].ci);
    }
  }

  // Score
  const base=cnt*10;const bonus=comboCount>1?comboCount*8:0;const earned=base+bonus;
  score+=earned;levelScore+=earned;
  let txt='+'+earned;if(comboCount>1)txt='Combo x'+comboCount+'! +'+earned;
  spawnFloatText(cx,cy,txt,comboCount>1?'#FF6600':'#FFD700',comboCount>1?22:16);
  if(comboCount>=2){comboFlash=0.3;sfxCombo(comboCount)}else{sfxMatch(cnt)}

  // Activate power-up
  if(ap===PWRS.BOMB)activateBomb(cx,cy);
  else if(ap===PWRS.PAUSE){pauseTimer=5;sfxPower()}
  else if(ap===PWRS.REVERSE){reverseTimer=3;sfxPower()}
  else if(ap===PWRS.ACCURACY){accuracyTimer=6;sfxPower()}

  updateUI();
  return true;
}

function activateBomb(x,y){
  const rad=60;shakeD=0.45;shakeI=10;sfxBomb();
  for(let i=marbles.length-1;i>=0;i--){const mp=getMPos(marbles[i]);if(Math.hypot(mp.x-x,mp.y-y)<rad){spawnSparks(mp.x,mp.y,15);marbles.splice(i,1)}}
  for(let i=0;i<36;i++){const a=(i/36)*Math.PI*2;particles.push({x,y,vx:Math.cos(a)*280,vy:Math.sin(a)*280,life:0.35,maxL:0.35,r:5,color:i%2===0?'#FF4400':'#FFAA00',alpha:0.9})}
  score+=15;levelScore+=15;spawnFloatText(x,y,'💥','#FF4400',24);
}

// ============================================================
//  FIXED_BUG_2: Recoil Animation — Front chain bounces backward
// ============================================================
function updateRecoil(dt){
  if(!recoilState)return false;
  const dtc=Math.min(dt,0.1);
  const move=Math.min(RECOIL_SPD*dtc,recoilState.recoilRemain);
  for(let j=recoilState.frontStartIdx;j<marbles.length;j++)marbles[j].dist-=move;
  recoilState.recoilRemain-=move;
  if(recoilState.recoilRemain<=0.5){recoilState=null;return true}
  return false;
}

// ============================================================
//  SNAP-BACK — Magnetic attraction after recoil
// ============================================================
function findSnapBack(){
  if(activeSnap||recoilState)return false; // wait for recoil to finish
  for(let i=1;i<marbles.length;i++){
    const gap=marbles[i].dist-marbles[i-1].dist;
    if(gap>MD+MG+6){
      if(marbles[i-1].ci===marbles[i].ci){
        activeSnap={rearEnd:i-1,frontStart:i,gapRemain:gap-(MD+MG),snapSpd:levelCfg.spd*3};
        sfxSnap();if(comboCount===0)comboCount=1;
        return true;
      }
    }
  }
  return false;
}
function updateSnapBack(dt){
  if(!activeSnap)return false;
  const dtc=Math.min(dt,0.1);
  const close=Math.min(activeSnap.snapSpd*dtc,activeSnap.gapRemain);
  for(let i=0;i<=activeSnap.rearEnd;i++)marbles[i].dist+=close;
  for(let i=0;i<=activeSnap.rearEnd;i+=2){const mp=getMPos(marbles[i]);spawnSnapTrail(mp.x,mp.y,marbles[i].ci)}
  activeSnap.gapRemain-=close;
  if(activeSnap.gapRemain<=0.5){
    // UPGRADE_3: Hard snap — enforce exact spacing to prevent overlap
    const frontLastDist=marbles[activeSnap.frontStart].dist;
    const targetRearDist=frontLastDist-MD-MG;
    const offset=targetRearDist-marbles[activeSnap.rearEnd].dist;
    for(let i=0;i<=activeSnap.rearEnd;i++)marbles[i].dist+=offset;
    
    // UPGRADE_3: Verify no overlap after snap
    for(let i=1;i<=activeSnap.rearEnd;i++){
      const gap=marbles[i].dist-marbles[i-1].dist;
      if(gap<MD+MG){
        marbles[i].dist=marbles[i-1].dist+MD+MG;
      }
    }
    
    activeSnap=null;
    // FIXED_BUG_2: After snap completes, immediately scan for cascading matches
    for(let i=0;i<marbles.length;i++){if(scanAndRemove(i))break;}
    return true;
  }
  return false;
}

// ============================================================
//  FIXED_BUG_1+2: Match Resolution — runs EVERY frame, not blocked
//  by flying balls. Handles cascading combos + recoil + snap-back.
// ============================================================
function processMatches(){
  // FIXED_BUG_1: Removed flyingBalls.length>0 guard — match detection now runs
  // immediately after each ball hits, even if other balls are still airborne.
  // Only block during active physics animations (recoil/snap).
  if(recoilState||activeSnap)return;

  let anyM=false;
  // FIXED_BUG_1: Scan entire chain for matches (handles all groups)
  for(let iter=0;iter<20;iter++){
    let hadM=false;
    for(let i=0;i<marbles.length;i++){
      if(scanAndRemove(i)){hadM=true;anyM=true;break;}
    }
    if(!hadM)break;
    // FIXED_BUG_2: After each match removal, try snap-back
    // (recoil blocks snap-back until animation completes)
    if(!recoilState&&!activeSnap)findSnapBack();
    if(recoilState||activeSnap)break;
  }
  if(!anyM&&comboCount>0){if(comboCount>maxCombo)maxCombo=comboCount;comboCount=0;updateUI()}
}

// ============================================================
//  UPDATE
// ============================================================
let trailTimer=0;
function update(dt){
  if(phase!=='playing')return;
  const dtc=Math.min(dt,0.1);
  if(comboFlash>0)comboFlash-=dtc;
  if(pauseTimer>0)pauseTimer-=dtc;if(reverseTimer>0)reverseTimer-=dtc;if(accuracyTimer>0)accuracyTimer-=dtc;
  if(shakeD>0){shakeD-=dtc;shakeX=(Math.random()-0.5)*shakeI*2;shakeY=(Math.random()-0.5)*shakeI*2;shakeI*=0.88;if(shakeD<=0){shakeX=0;shakeY=0}}
  if(pauseTimer>0&&Math.random()<0.3){const mx=Math.random()*CW,my=Math.random()*CH;spawnIce(mx,my)}
  
  // UPGRADE_1: Update swap animation
  if(swapAnim){
    swapAnim.progress+=dtc/swapAnim.duration;
    if(swapAnim.progress>=1)swapAnim=null;
  }

  // FIXED_BUG_2: Animate recoil FIRST, then snap
  if(recoilState)updateRecoil(dtc);

  // Normal chain movement (skip rear section during active snap)
  let mv=levelCfg.spd;if(pauseTimer>0)mv=0;if(reverseTimer>0)mv=-levelCfg.spd*1.5;
  if(mv!==0){
    for(let i=0;i<marbles.length;i++){
      if(activeSnap&&i<=activeSnap.rearEnd)continue;
      marbles[i].dist+=mv*dtc;
    }
  }

  // Animated snap-back
  if(activeSnap&&!recoilState)updateSnapBack(dtc);

  // Clamp & lose check with suction animation
  for(const m of marbles){if(m.dist<MR)m.dist=MR}
  // UPGRADE_2: Trigger suction animation instead of immediate game over
  if(!suctionState){
    for(let i=0;i<marbles.length;i++){
      if(marbles[i].dist>=track.totalLen-MR){
        const mp=getMPos(marbles[i]);
        const endP=track.pts[track.pts.length-1];
        suctionState={marble:marbles[i],startX:mp.x,startY:mp.y,startDist:marbles[i].dist,progress:0,duration:0.4,endX:endP.x,endY:endP.y};
        marbles.splice(i,1);
        break;
      }
    }
  }
  
  // UPGRADE_2: Update suction animation
  if(suctionState){
    suctionState.progress+=dtc/suctionState.duration;
    if(suctionState.progress>=1){
      phase='lose';sfxLose();suctionState=null;
    }
  }

  // Spawn new marbles
  if(spawning){
    pushTimer+=dtc;
    if(pushTimer>=levelCfg.pushInt){
      pushTimer=0;const sd=MR+4;
      for(let i=0;i<levelCfg.pushCnt;i++){
        let lastD=sd;
        for(let j=marbles.length-1;j>=0;j--)if(marbles[j].dist<sd+60)lastD=Math.max(lastD,marbles[j].dist+MD+MG);else break;
        if(lastD<track.totalLen-MR){marbles.push({ci:randCol(),dist:lastD,pwr:randPwr()});marbles.sort((a,b)=>a.dist-b.dist)}
      }
    }
  }
  // FIXED_BUG_3: Mark spawning complete when target score reached
  if(spawning&&levelScore>=levelCfg.target){spawning=false;spawningComplete=true}

  // Flying balls — reverse iteration for safe splice
  for(let i=flyingBalls.length-1;i>=0;i--){
    const fb=flyingBalls[i];
    fb.x+=fb.vx*dtc;fb.y+=fb.vy*dtc;
    if(accuracyTimer>0){trailTimer+=dtc;if(trailTimer>0.03){trailTimer=0;fb.trail=fb.trail||[];fb.trail.push({x:fb.x,y:fb.y,life:0.2,maxL:0.2});if(fb.trail.length>15)fb.trail.shift()}}
    // FIXED_BUG_1: Immediately scan for matches after successful insertion
    const insIdx=checkFlyingCollision(fb,i);
    if(insIdx>=0){
      // FIXED_BUG_1: Bidirectional scan from insertion point — handles
      // edge cases (first/last marble, single marble) correctly
      scanAndRemove(insIdx);
      // After scan (which may set recoilState), check for cascading
      if(!recoilState&&!activeSnap){
        // Scan ALL positions for additional matches created by push
        for(let j=0;j<marbles.length;j++){if(scanAndRemove(j))break;}
      }
    }
  }
  // Update trails
  for(const fb of flyingBalls){if(fb.trail){for(const t of fb.trail)t.life-=dtc;fb.trail=fb.trail.filter(t=>t.life>0)}}

  // Particles
  for(const p of particles){p.x+=p.vx*dtc;p.y+=p.vy*dtc;p.life-=dtc;p.alpha=Math.max(0,p.life/p.maxL)}
  particles=particles.filter(p=>p.life>0);
  for(const ft of floatingTexts){ft.y-=30*dtc;ft.life-=dtc}
  floatingTexts=floatingTexts.filter(ft=>ft.life>0);

  // UPGRADE_2: Skull glow — crisis mode triggers at 120px
  let nearEnd=false;for(const m of marbles){if(m.dist>track.totalLen-120){nearEnd=true;break}}
  skullGlow+=(nearEnd?1:-1)*dtc*3;skullGlow=Math.max(0,Math.min(1,skullGlow));

  // FIXED_BUG_3: Level clear — spawning must be complete AND all marbles cleared
  if(spawningComplete&&marbles.length===0&&flyingBalls.length===0){
    if(levelClearTimer===0)sfxLevelClear();
    levelClearTimer+=dtc;
    if(levelClearTimer>0.6){phase='levelClear';levelClearTimer=0}
  }

  // Cascading match resolution (catches any remaining matches)
  processMatches();
}

function drawTrack(){

  ctx.beginPath();ctx.moveTo(track.pts[0].x,track.pts[0].y);for(let i=1;i<track.pts.length;i++)ctx.lineTo(track.pts[i].x,track.pts[i].y);ctx.stroke();
  ctx.strokeStyle='rgba(50,30,80,0.7)';ctx.lineWidth=28;
  ctx.beginPath();ctx.moveTo(track.pts[0].x,track.pts[0].y);for(let i=1;i<track.pts.length;i++)ctx.lineTo(track.pts[i].x,track.pts[i].y);ctx.stroke();
  ctx.strokeStyle='rgba(25,12,45,0.9)';ctx.lineWidth=22;
  ctx.beginPath();ctx.moveTo(track.pts[0].x,track.pts[0].y);for(let i=1;i<track.pts.length;i++)ctx.lineTo(track.pts[i].x,track.pts[i].y);ctx.stroke();
  ctx.strokeStyle='rgba(140,100,200,0.25)';ctx.lineWidth=30;

  if(levelCfg.tunnels){for(const tn of levelCfg.tunnels){

    for(const s of track.segs){
      const ss=s.cum,se=s.cum+s.len;if(se<tn.from*track.totalLen||ss>tn.to*track.totalLen)continue;
      const t1=Math.max(0,(tn.from*track.totalLen-s.cum)/s.len),t2=Math.min(1,(tn.to*track.totalLen-s.cum)/s.len);
      const x1=s.x1+(s.x2-s.x1)*t1,y1=s.y1+(s.y2-s.y1)*t1,x2=s.x1+(s.x2-s.x1)*t2,y2=s.y1+(s.y2-s.y1)*t2;
      if(!st){ctx.moveTo(x1,y1);st=true}ctx.lineTo(x2,y2);
    }ctx.setLineDash([7,9]);ctx.stroke();ctx.setLineDash([]);
  }}
}
function drawSkull(x,y){

  og.addColorStop(1,'rgba(255,50,0,0)');ctx.fillStyle=og;ctx.beginPath();ctx.arc(x,y,s*2.5,0,Math.PI*2);ctx.fill();

function drawLauncher(){

  // Frog body
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(LX,LY+4,30,26,0,0,Math.PI*2);ctx.fill();
  const bg=ctx.createRadialGradient(LX-5,LY-8,8,LX,LY,30);bg.addColorStop(0,'#5B9A3B');bg.addColorStop(0.5,'#3B7A1B');bg.addColorStop(1,'#1B4A00');
  ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(LX,LY,28,24,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#8BC34A';ctx.lineWidth=2.5;ctx.stroke();
  
  // Frog eyes
  for(let s=-1;s<=1;s+=2){
    const ex=LX+s*14,ey=LY-16;
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(ex,ey-4,10,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#1B4A00';ctx.lineWidth=1.5;ctx.stroke();
    const px=Math.cos(launcherAngle)*2.5,py=Math.sin(launcherAngle)*2.5;
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex+px,ey-4+py,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(ex+px-1,ey-4+py-1.5,1.8,0,Math.PI*2);ctx.fill();
  }
  
  // Barrel
  const bx=LX+Math.cos(launcherAngle)*20,by=LY+Math.sin(launcherAngle)*20;
  ctx.strokeStyle='#2B5A00';ctx.lineWidth=12;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(LX,LY);ctx.lineTo(bx,by);ctx.stroke();
  ctx.strokeStyle='#4B8A1B';ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(LX,LY);ctx.lineTo(bx,by);ctx.stroke();
  
  // UPGRADE_1: Draw next ball (behind, smaller, semi-transparent)
  const nextX=LX-Math.cos(launcherAngle)*cNextBallDist;
  const nextY=LY-Math.sin(launcherAngle)*cNextBallDist;
  ctx.save();
  ctx.globalAlpha=0.6;
  drawMarble(nextX,nextY,nextBall,null,1,nextBallR);
  ctx.restore();
  
  // UPGRADE_1: Draw current ball (in front, with glow)
  const curX=LX+Math.cos(launcherAngle)*curBallDist;
  const curY=LY+Math.sin(launcherAngle)*curBallDist;
  ctx.save();
  ctx.shadowColor=COLORS[curBall].hex;
  ctx.shadowBlur=12;
  drawMarble(curX,curY,curBall,null,1,curBallR);
  ctx.restore();
  
  // Belly highlight
  ctx.fillStyle='rgba(180,230,150,0.25)';ctx.beginPath();ctx.ellipse(LX-2,LY+6,12,8,0,0,Math.PI*2);ctx.fill();
  
  // Accuracy laser
  if(accuracyTimer>0){
    const pulse=0.5+0.5*Math.sin(Date.now()/130);
    const lx=LX+Math.cos(launcherAngle)*42,ly=LY+Math.sin(launcherAngle)*42;
    ctx.strokeStyle=`rgba(255,${Math.floor(60+100*pulse)},50,${0.35+0.3*pulse})`;
    ctx.lineWidth=2.5+pulse;ctx.setLineDash([10,6]);
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(LX+Math.cos(launcherAngle)*600,LY+Math.sin(launcherAngle)*600);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=`rgba(255,100,50,${0.5+0.4*pulse})`;ctx.beginPath();ctx.arc(lx,ly,5,0,Math.PI*2);ctx.fill();
  }
}
function drawFlyingBalls(){
  for(const fb of flyingBalls){
    if(fb.trail&&fb.trail.length>0){for(const t of fb.trail){const a=(t.life/t.maxL)*0.45,r=MR*(t.life/t.maxL)*0.7;ctx.fillStyle=hexToRgba(COLORS[fb.ci].hex,a);ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fill()}}
    drawMarble(fb.x,fb.y,fb.ci,null);
  }
}
function drawParticles(){for(const p of particles){ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.alpha,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function drawFloatTexts(){for(const ft of floatingTexts){ctx.globalAlpha=ft.life/ft.maxL;ctx.fillStyle=ft.color;ctx.font=`bold ${ft.size}px "Microsoft YaHei",sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=3;ctx.fillText(ft.text,ft.x,ft.y);ctx.shadowBlur=0}ctx.globalAlpha=1}
function drawProgressBar(){
  const bx=50,by=12,bw=700,bh=14,br=7;ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();roundRect(bx,by,bw,bh,br);ctx.fill();ctx.strokeStyle='rgba(200,160,80,0.6)';ctx.lineWidth=2;ctx.beginPath();roundRect(bx,by,bw,bh,br);ctx.stroke();
  const pct=Math.min(1,levelScore/levelCfg.target);if(pct>0){const fw=(bw-4)*pct,fg=ctx.createLinearGradient(bx,0,bx+bw,0);fg.addColorStop(0,'#FF6600');fg.addColorStop(0.5,'#FFD700');fg.addColorStop(1,'#FFEE44');ctx.fillStyle=fg;ctx.beginPath();roundRect(bx+2,by+2,fw,bh-4,br-2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();roundRect(bx+2,by+2,fw,(bh-4)/2,br-2);ctx.fill()}
  const segs=8,sw=bw/segs;for(let i=1;i<segs;i++){ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bx+i*sw,by+2);ctx.lineTo(bx+i*sw,by+bh-2);ctx.stroke()}
  ctx.fillStyle='#fff';ctx.font='bold 12px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText(`${Math.floor(pct*100)}%`,bx+bw/2,by+bh-2);
  // FIXED_BUG_3: Show "stop spawning" message only when target reached
  if(spawningComplete&&marbles.length>0){ctx.fillStyle='#FFD700';ctx.font='bold 13px "Microsoft YaHei",sans-serif';ctx.fillText('進度100%！清空所有滾珠即可過關！',bx+bw/2,by+bh+16)}
}
function drawOverlays(){
  if(pauseTimer>0){const a=0.08+0.04*Math.sin(Date.now()/300),g=ctx.createRadialGradient(CW/2,CH/2,180,CW/2,CH/2,500);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(50,100,200,${a})`);ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);ctx.fillStyle=`rgba(140,200,255,${0.45+0.2*Math.sin(Date.now()/400)})`;ctx.font='bold 18px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('⏸ 暫停 '+Math.ceil(pauseTimer)+'s',CW/2,CH-28)}
  if(reverseTimer>0){ctx.fillStyle=`rgba(100,255,150,${0.12+0.04*Math.sin(Date.now()/200)})`;ctx.font='bold 18px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('⏪ 倒退 '+Math.ceil(reverseTimer)+'s',CW/2,CH-28)}
  if(comboFlash>0){ctx.fillStyle=`rgba(255,200,50,${comboFlash*0.3})`;ctx.fillRect(0,0,CW,CH)}
}
function render(){
  ctx.clearRect(0,0,CW,CH);const bg=ctx.createRadialGradient(400,300,30,400,300,520);bg.addColorStop(0,'#2a1545');bg.addColorStop(0.6,'#150a28');bg.addColorStop(1,'#050510');ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);
  ctx.save();if(shakeD>0)ctx.translate(shakeX,shakeY);
  drawTrack();
  for(const m of marbles){const mp=getMPos(m);drawMarble(mp.x,mp.y,m.ci,m.pwr,isInTunnel(m.dist)?0.3:1)}
  // UPGRADE_2: Draw suction animation
  if(suctionState){
    const t=suctionState.progress;
    const easeT=t*t*(3-2*t); // Smoothstep easing
    // Spiral toward skull
    const angle=t*Math.PI*4; // 2 full rotations
    const spiralRadius=20*(1-easeT);
    const x=suctionState.endX+Math.cos(angle)*spiralRadius*(1-easeT);
    const y=suctionState.endY+Math.sin(angle)*spiralRadius*(1-easeT);
    const scale=1-easeT;
    ctx.save();
    ctx.globalAlpha=1-easeT;
    drawMarble(x,y,suctionState.marble.ci,suctionState.marble.pwr,1-easeT,MR*scale);
    ctx.restore();
  }
  drawLauncher();drawFlyingBalls();drawParticles();drawFloatTexts();ctx.restore();drawOverlays();
  if(phase==='playing'||phase==='levelClear')drawProgressBar();
  if(phase==='title')drawTitle();else if(phase==='win')drawWin();else if(phase==='lose')drawLose();else if(phase==='levelClear')drawLevelClear();
  if(isTouch&&phase==='playing'){ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('點擊中央切換',LX,LY+50)}
  if(!isTouch&&phase==='playing'){ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText('[Space]切換 | 左鍵連射',CW-10,CH-8)}
}
function drawTitle(){
  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,CW,CH);ctx.fillStyle='#FFD700';ctx.font='bold 54px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('祖 瑪',CW/2,160);ctx.fillStyle='#FFAA00';ctx.font='bold 20px "Microsoft YaHei",sans-serif';ctx.fillText('Z U M A   D E L U X E',CW/2,200);ctx.fillStyle='#fff';ctx.font='17px "Microsoft YaHei",sans-serif';ctx.fillText('點擊畫面 或 按 Enter 開始',CW/2,280);ctx.fillStyle='#aaa';ctx.font='13px "Microsoft YaHei",sans-serif';ctx.fillText('PC: 滑鼠瞄準 | 左鍵連射 | Space 切換',CW/2,330);ctx.fillText('手機: 觸控瞄準即發射 | 點中央切換',CW/2,352);ctx.fillText('10大關卡等你挑戰！',CW/2,385);
  for(let i=0;i<10;i++){const a=(Date.now()/2000+i*Math.PI/5)%(Math.PI*2);drawMarble(CW/2+Math.cos(a)*120,240+Math.sin(a)*25,i%5,null,0.65)}
}
function drawWin(){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,CW,CH);ctx.fillStyle='#FFD700';ctx.font='bold 44px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('🎉 全部通關！',CW/2,200);ctx.fillStyle='#fff';ctx.font='19px "Microsoft YaHei",sans-serif';ctx.fillText('總分: '+score+'  最大連擊: x'+maxCombo,CW/2,260);ctx.fillStyle='#FFAA00';ctx.font='17px "Microsoft YaHei",sans-serif';ctx.fillText('點擊 或 按 R 重新開始',CW/2,320)}
function drawLose(){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,CW,CH);ctx.fillStyle='#FF4444';ctx.font='bold 44px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('💀 失敗！',CW/2,200);ctx.fillStyle='#fff';ctx.font='19px "Microsoft YaHei",sans-serif';ctx.fillText('分數: '+score+'  最大連擊: x'+maxCombo,CW/2,260);ctx.fillStyle='#FFAA00';ctx.font='17px "Microsoft YaHei",sans-serif';ctx.fillText('點擊 或 按 R 重新挑戰',CW/2,320)}
function drawLevelClear(){const t=levelClearTimer||0;ctx.fillStyle=`rgba(0,0,0,${Math.min(0.7,t*2)})`;ctx.fillRect(0,0,CW,CH);const scale=Math.min(1,t*3);ctx.save();ctx.translate(CW/2,240);ctx.scale(scale,scale);ctx.fillStyle='#FFD700';ctx.font='bold 40px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('🎉 關卡完成！',0,0);ctx.restore();ctx.fillStyle='#fff';ctx.font='18px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('分數: '+score+'  本關目標: '+levelCfg.target,CW/2,285);if(currentLvl<LEVELS.length-1){ctx.fillStyle='#FFAA00';ctx.font='16px "Microsoft YaHei",sans-serif';ctx.fillText('點擊 或 按 Enter 進入下一關',CW/2,320)}else{ctx.fillStyle='#FFAA00';ctx.font='16px "Microsoft YaHei",sans-serif';ctx.fillText('點擊 或 按 Enter 查看總結',CW/2,320)}}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}

// ============================================================
//  GAME FLOW
// ============================================================
function startGame(){score=0;levelScore=0;comboCount=0;maxCombo=0;currentLvl=0;loadLevel(0)}
function restartGame(){levelScore=0;comboCount=0;loadLevel(currentLvl)}
function nextLevel(){if(currentLvl<LEVELS.length-1){currentLvl++;levelScore=0;loadLevel(currentLvl)}else{phase='win';sfxWin()}}
function handleScreenClick(){if(phase==='title')startGame();else if(phase==='win')restartGame();else if(phase==='lose')restartGame();else if(phase==='levelClear')nextLevel()}

// ============================================================
//  MAIN LOOP
// ============================================================
let lastT=0;
function loop(ts){const dt=lastT?(ts-lastT)/1000:0.016;lastT=ts;update(dt);render();requestAnimationFrame(loop)}

// ============================================================
//  INIT
// ============================================================
function init(){
  canvas=document.getElementById('c');ctx=canvas.getContext('2d');
  canvas.addEventListener('pointerdown',onPDown);canvas.addEventListener('pointermove',onPMove);
  canvas.addEventListener('pointerup',onPUp);canvas.addEventListener('pointerenter',onPEnter);
  canvas.addEventListener('pointerleave',onPLeave);document.addEventListener('keydown',onKey);
  canvas.addEventListener('click',(e)=>{if(phase!=='playing')handleScreenClick()});
  isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
  loadLevel(0);phase='title';updateUI();requestAnimationFrame(loop);
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body>
