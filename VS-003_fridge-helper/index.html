<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>冰箱保衛戰</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body class="min-h-screen">

  <header class="fixed top-0 left-0 right-0 z-30 bg-white/60 backdrop-blur-2xl border-b border-black/5">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
      <span class="text-2xl font-bold tracking-tight text-[#1D1D1F]">冰箱保衛戰</span>
    </div>
  </header>

  <!-- Category Tab Switch -->
  <div class="fixed top-12 left-0 right-0 z-30 flex justify-center pointer-events-none">
    <div class="glass-card rounded-full p-1 flex gap-0.5 pointer-events-auto shadow-sm">
      <button id="tab-food-btn" class="category-tab active px-5 py-2 rounded-full text-sm font-semibold transition-all">🍏 智慧冰箱</button>
      <button id="tab-consumable-btn" class="category-tab px-5 py-2 rounded-full text-sm font-semibold transition-all">⚙️ 居家耗材</button>
    </div>
  </div>

  <!-- Auto-Cart Capsule -->
  <button id="auto-cart-btn" class="hidden fixed bottom-24 right-24 w-12 h-12 glass-card rounded-full text-xl shadow-lg flex items-center justify-center z-40 select-none">
    🛒
    <span id="auto-cart-badge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-[#FF3B30] text-white text-[10px] rounded-full flex items-center justify-center font-bold">0</span>
  </button>
  <div id="stats-bar" class="hidden max-w-md mx-auto px-4 pt-16 pb-2">
    <div class="flex gap-2.5">
      <div class="flex-1 glass-card rounded-2xl px-4 py-3">
        <div class="text-sm text-[#86868B] font-medium">📦 總食材</div>
        <div class="text-3xl font-bold text-[#1D1D1F]" id="stat-total">0</div>
      </div>
      <div class="flex-1 glass-card rounded-2xl px-4 py-3">
        <div class="text-sm text-[#86868B] font-medium">⚠️ 快過期</div>
        <div class="text-3xl font-bold text-[#FF3B30]" id="stat-urgent">0</div>
      </div>
      <div class="flex-1 glass-card rounded-2xl px-4 py-3">
        <div class="text-sm text-[#86868B] font-medium">✅ 安全</div>
        <div class="text-3xl font-bold text-[#34C759]" id="stat-safe">0</div>
      </div>
    </div>
  </div>

  <!-- Tab Pages -->
  <div id="tab-fridge" class="tab-page max-w-md mx-auto px-0 pb-28 pt-1">
    <canvas id="food-canvas" class="w-full block"></canvas>
  </div>

  <div id="tab-shopping" class="tab-page hidden max-w-md mx-auto px-4 pb-28 pt-16">
    <div class="flex gap-2 mb-4">
      <input id="shop-input-inline" type="text" placeholder="加入品項..." class="flex-1 glass-card rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-gray-200">
      <button id="shop-add-inline" class="px-5 py-3 rounded-xl bg-[#1D1D1F] text-white text-base font-semibold shrink-0">加入</button>
    </div>
    <ul id="shop-list-inline" class="space-y-2.5"></ul>
    <button id="shop-clear-inline" class="hidden w-full mt-4 py-3 rounded-xl border border-gray-200 text-gray-500 text-base font-medium">清除已購買</button>
  </div>

  <div id="tab-settings" class="tab-page hidden max-w-md mx-auto px-4 pb-28 pt-16">
    <div class="glass-card rounded-2xl overflow-hidden mb-3">
      <button id="btn-manage-categories" class="w-full px-5 py-4 text-left text-[17px] text-[#1D1D1F] border-b border-black/5 flex items-center gap-3">🥩 自訂類別<span class="text-[#86868B] text-sm ml-auto">6 種</span></button>
      <button id="btn-manage-locations" class="w-full px-5 py-4 text-left text-[17px] text-[#1D1D1F] border-b border-black/5 flex items-center gap-3">📍 管理位置</button>
      <button id="btn-export-data" class="w-full px-5 py-4 text-left text-[17px] text-[#1D1D1F] border-b border-black/5 flex items-center gap-3">📤 匯出備份</button>
      <button id="btn-import-data" class="w-full px-5 py-4 text-left text-[17px] text-[#1D1D1F] border-b border-black/5 flex items-center gap-3">📥 匯入備份</button>
    </div>
    <div class="glass-card rounded-2xl overflow-hidden">
      <button id="btn-clear-data" class="w-full px-5 py-4 text-left text-[17px] text-[#FF3B30] flex items-center gap-3">🗑 清除所有資料</button>
    </div>
    <p class="text-center text-sm text-[#86868B] mt-5">冰箱保衛戰 v1.0 · Apple Canvas Edition</p>
  </div>

  <!-- FAB -->
  <button id="fab" class="fixed bottom-24 right-5 w-16 h-16 bg-gradient-to-br from-[#FF3B30] to-[#FF6B6B] text-white rounded-full text-3xl shadow-xl shadow-red-500/20 flex items-center justify-center active:scale-95 transition-transform z-40 select-none">
    ＋
  </button>

  <!-- Bottom Nav -->
  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 z-30 bg-white/60 backdrop-blur-2xl border-t border-black/5 safe-bottom">
    <div class="max-w-md mx-auto flex">
      <button data-tab="fridge" class="nav-tab active flex-1 py-2 flex flex-col items-center gap-0.5 text-[13px] font-semibold text-[#FF3B30]">
        <span class="text-2xl">🧊</span> 冰箱
      </button>
      <button data-tab="shopping" class="nav-tab flex-1 py-2 flex flex-col items-center gap-0.5 text-[13px] font-semibold text-[#86868B] relative">
        <span class="text-2xl">🛒</span> 購物
        <span id="nav-shop-badge" class="hidden absolute top-0 right-1/4 w-5 h-5 bg-[#FF3B30] text-white text-[10px] rounded-full flex items-center justify-center font-bold">0</span>
      </button>
      <button data-tab="settings" class="nav-tab flex-1 py-2 flex flex-col items-center gap-0.5 text-[13px] font-semibold text-[#86868B]">
        <span class="text-2xl">⚙</span> 設定
      </button>
    </div>
  </nav>

  <!-- Add Food Modal -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/30 z-50 flex items-end sm:items-center justify-center">
    <div class="glass-modal w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-xl animate-slide-up">
      <h2 class="text-xl font-bold text-[#1D1D1F] mb-4">🛒 新增食材</h2>
      <form id="add-food-form" class="space-y-3.5">
        <div>
          <label class="block text-sm text-[#86868B] mb-1 font-medium">食材名稱</label>
          <input type="text" name="name" required placeholder="例如：高鮮鮮奶" class="w-full glass-input rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-gray-200">
        </div>
        <div>
          <label class="block text-sm text-[#86868B] mb-1 font-medium">類別</label>
          <select name="category" id="category-select" required class="w-full glass-input rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-gray-200"></select>
        </div>
        <div>
          <label class="block text-sm text-[#86868B] mb-1 font-medium">存放位置</label>
          <select name="location" id="location-select" required class="w-full glass-input rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-gray-200"></select>
        </div>
        <div>
          <label class="block text-sm text-[#86868B] mb-1 font-medium">單位</label>
          <select name="unitType" id="unit-type-select" required class="w-full glass-input rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-gray-200">
            <option value="x">🍏 個數 (x)</option>
            <option value="ml">🥛 液體 (ml)</option>
            <option value="g">🥩 重量 (g)</option>
            <option value="%">🥫 醬料 (%)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-[#86868B] mb-1 font-medium">數量</label>
          <div class="flex items-center gap-2">
            <input type="number" name="quantity" min="1" value="1" required class="flex-1 glass-input rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-gray-200">
            <span id="unit-label" class="text-base text-[#86868B] shrink-0 w-6 text-center">x</span>
          </div>
        </div>
        <div>
          <label class="block text-sm text-[#86868B] mb-1 font-medium">到期日 (支援 "明天"、"3天後")</label>
          <input type="date" name="expireDate" id="expire-date-input" class="w-full glass-input rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-gray-200">
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" id="modal-cancel" class="flex-1 py-3.5 rounded-xl bg-gray-100 text-[#1D1D1F] font-semibold text-base">取消</button>
          <button type="submit" class="flex-1 py-3.5 rounded-xl bg-[#1D1D1F] text-white font-semibold text-base">加入冰箱</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Location Manager Modal -->
  <div id="location-modal-overlay" class="hidden fixed inset-0 bg-black/30 z-[60] flex items-end sm:items-center justify-center">
    <div class="glass-modal w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-xl animate-slide-up">
      <h2 class="text-xl font-bold text-[#1D1D1F] mb-4">📍 管理位置</h2>
      <ul id="location-list" class="space-y-2 mb-4 max-h-60 overflow-y-auto"></ul>
      <div class="flex gap-2 mb-4">
        <input id="new-location-input" type="text" placeholder="新位置名稱" class="flex-1 glass-input rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-gray-200">
        <button id="add-location-btn" class="px-5 py-3 rounded-xl bg-[#1D1D1F] text-white text-base font-semibold shrink-0">新增</button>
      </div>
      <button id="location-modal-close" class="w-full py-3 rounded-xl bg-gray-100 text-[#1D1D1F] font-semibold text-base">關閉</button>
    </div>
  </div>

  <!-- Purchase Dialog -->
  <div id="purchase-overlay" class="hidden fixed inset-0 bg-black/30 z-[70] flex items-end sm:items-center justify-center">
    <div class="glass-modal w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-xl animate-slide-up">
      <h2 class="text-xl font-bold text-[#1D1D1F] mb-3">🛒 自動採購</h2>
      <p class="text-base text-[#86868B] mb-4">已為您比價並將最佳型號加入購物車</p>
      <ul id="purchase-list" class="space-y-2 mb-4 max-h-48 overflow-y-auto"></ul>
      <div class="flex gap-3">
        <button id="purchase-close" class="flex-1 py-3 rounded-xl bg-gray-100 text-[#1D1D1F] font-semibold text-base">關閉</button>
        <button id="purchase-go" class="flex-1 py-3 rounded-xl bg-[#007AFF] text-white font-semibold text-base">一鍵前往結帳</button>
      </div>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/model.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/state.js"></script>
  <script src="js/history.js"></script>
  <script src="js/metric.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/undo.js"></script>
  <script src="js/notifier.js"></script>
  <script src="js/shopping-list.js"></script>
  <script src="js/canvas-ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
